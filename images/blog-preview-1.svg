<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2847"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffc8"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="600" y2="50"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="75" y1="0" x2="75" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="225" y1="0" x2="225" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="375" y1="0" x2="375" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="525" y1="0" x2="525" y2="400"/>
  </g>

  <!-- Flowing data line (background, wide glow) -->
  <path d="M0,280 C80,260 120,220 180,230 S260,180 320,190 S400,140 460,160 S540,120 600,130"
        fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.15" filter="url(#bigGlow)"/>

  <!-- Flowing data line (main) -->
  <path d="M0,280 C80,260 120,220 180,230 S260,180 320,190 S400,140 460,160 S540,120 600,130"
        fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6" filter="url(#glow)"/>

  <!-- Second flowing line -->
  <path d="M0,320 C100,300 140,270 200,290 S300,240 360,250 S440,200 500,210 S560,180 600,175"
        fill="none" stroke="#00ffc8" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>

  <!-- Third flowing line -->
  <path d="M0,340 C60,335 130,310 200,320 S280,290 350,280 S430,260 500,250 S570,230 600,220"
        fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.25" filter="url(#glow)"/>

  <!-- Bar chart cluster (left area) -->
  <g transform="translate(80, 120)" filter="url(#glow)">
    <rect x="0" y="100" width="18" height="80" rx="2" fill="url(#barGrad)" opacity="0.7"/>
    <rect x="26" y="70" width="18" height="110" rx="2" fill="url(#barGrad)" opacity="0.8"/>
    <rect x="52" y="40" width="18" height="140" rx="2" fill="url(#barGrad)" opacity="0.9"/>
    <rect x="78" y="60" width="18" height="120" rx="2" fill="url(#barGrad)" opacity="0.75"/>
    <rect x="104" y="85" width="18" height="95" rx="2" fill="url(#barGrad)" opacity="0.65"/>
    <!-- Axis line -->
    <line x1="-5" y1="180" x2="130" y2="180" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <line x1="-5" y1="40" x2="-5" y2="180" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Mini pie/donut chart (right area) -->
  <g transform="translate(440, 100)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#0d2847" stroke-width="14"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00d4ff" stroke-width="14"
            stroke-dasharray="150 251.3" stroke-dashoffset="0" opacity="0.8"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00ffc8" stroke-width="14"
            stroke-dasharray="60 251.3" stroke-dashoffset="-150" opacity="0.6"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#7c3aed" stroke-width="14"
            stroke-dasharray="41.3 251.3" stroke-dashoffset="-210" opacity="0.5"/>
  </g>

  <!-- Data points / scatter -->
  <g filter="url(#glow)">
    <circle cx="280" cy="160" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="310" cy="145" r="2" fill="#00ffc8" opacity="0.6"/>
    <circle cx="350" cy="170" r="4" fill="#00d4ff" opacity="0.5"/>
    <circle cx="390" cy="130" r="2.5" fill="#00ffc8" opacity="0.7"/>
    <circle cx="330" cy="185" r="2" fill="#7c3aed" opacity="0.5"/>
    <circle cx="370" cy="155" r="3" fill="#00d4ff" opacity="0.6"/>
  </g>

  <!-- Horizontal metric lines (bottom right) -->
  <g transform="translate(350, 260)" opacity="0.5">
    <rect x="0" y="0" width="180" height="3" rx="1.5" fill="#0d2847"/>
    <rect x="0" y="0" width="140" height="3" rx="1.5" fill="#00d4ff" opacity="0.7"/>
    <rect x="0" y="16" width="180" height="3" rx="1.5" fill="#0d2847"/>
    <rect x="0" y="16" width="110" height="3" rx="1.5" fill="#00ffc8" opacity="0.6"/>
    <rect x="0" y="32" width="180" height="3" rx="1.5" fill="#0d2847"/>
    <rect x="0" y="32" width="160" height="3" rx="1.5" fill="#00d4ff" opacity="0.5"/>
    <rect x="0" y="48" width="180" height="3" rx="1.5" fill="#0d2847"/>
    <rect x="0" y="48" width="90" height="3" rx="1.5" fill="#7c3aed" opacity="0.4"/>
  </g>

  <!-- Decorative corner elements -->
  <path d="M20,20 L50,20 M20,20 L20,50" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <path d="M580,20 L550,20 M580,20 L580,50" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <path d="M20,380 L50,380 M20,380 L20,350" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <path d="M580,380 L550,380 M580,380 L580,350" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
</svg>