<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2847"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2847"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="screenGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)"/>

  <!-- Screen/presentation shape -->
  <g transform="translate(120, 50)">
    <!-- Screen glow -->
    <rect x="10" y="10" width="340" height="210" rx="8" fill="#00d4ff" opacity="0.03" filter="url(#screenGlow)"/>
    <!-- Screen border -->
    <rect x="0" y="0" width="360" height="230" rx="8" fill="url(#screenGrad)" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <!-- Screen inner border glow -->
    <rect x="4" y="4" width="352" height="222" rx="6" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>

    <!-- Flowchart nodes inside screen -->
    <g filter="url(#glow)">
      <!-- Top node -->
      <rect x="140" y="25" width="80" height="36" rx="6" fill="url(#nodeGrad)" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
      <line x1="155" y1="43" x2="205" y2="43" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

      <!-- Connection lines from top -->
      <line x1="160" y1="61" x2="100" y2="90" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
      <line x1="200" y1="61" x2="260" y2="90" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>

      <!-- Left node -->
      <rect x="60" y="90" width="80" height="36" rx="6" fill="url(#nodeGrad)" stroke="#00ffc8" stroke-width="1.5" opacity="0.7"/>
      <line x1="75" y1="108" x2="125" y2="108" stroke="#00ffc8" stroke-width="1" opacity="0.3"/>

      <!-- Right node -->
      <rect x="220" y="90" width="80" height="36" rx="6" fill="url(#nodeGrad)" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
      <line x1="235" y1="108" x2="285" y2="108" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>

      <!-- Connection lines down -->
      <line x1="100" y1="126" x2="100" y2="155" stroke="#00ffc8" stroke-width="1" opacity="0.4"/>
      <line x1="260" y1="126" x2="260" y2="155" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
      <line x1="100" y1="155" x2="180" y2="155" stroke="#00d4ff" stroke-width="1" opacity="0.35"/>
      <line x1="260" y1="155" x2="180" y2="155" stroke="#00d4ff" stroke-width="1" opacity="0.35"/>

      <!-- Bottom node -->
      <rect x="140" y="155" width="80" height="36" rx="6" fill="url(#nodeGrad)" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
      <line x1="155" y1="173" x2="205" y2="173" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>

      <!-- Connection dots at intersections -->
      <circle cx="180" cy="43" r="3" fill="#00d4ff" opacity="0.8"/>
      <circle cx="100" cy="108" r="3" fill="#00ffc8" opacity="0.7"/>
      <circle cx="260" cy="108" r="3" fill="#00d4ff" opacity="0.7"/>
      <circle cx="180" cy="173" r="3" fill="#7c3aed" opacity="0.6"/>
    </g>

    <!-- Data sparkles inside screen -->
    <g opacity="0.25">
      <circle cx="30" cy="30" r="1.5" fill="#00d4ff"/>
      <circle cx="330" cy="35" r="1" fill="#00ffc8"/>
      <circle cx="25" cy="200" r="1" fill="#00d4ff"/>
      <circle cx="340" cy="195" r="1.5" fill="#00ffc8"/>
      <circle cx="50" cy="165" r="1" fill="#7c3aed"/>
      <circle cx="310" cy="160" r="1" fill="#7c3aed"/>
    </g>
  </g>

  <!-- Screen stand -->
  <g opacity="0.4">
    <line x1="300" y1="280" x2="300" y2="310" stroke="#00d4ff" stroke-width="2"/>
    <line x1="260" y1="310" x2="340" y2="310" stroke="#00d4ff" stroke-width="2"/>
  </g>

  <!-- Floating data elements outside screen -->
  <g filter="url(#softGlow)" opacity="0.4">
    <!-- Left side floating elements -->
    <rect x="30" y="100" width="60" height="4" rx="2" fill="#00d4ff" opacity="0.5"/>
    <rect x="40" y="112" width="40" height="4" rx="2" fill="#00ffc8" opacity="0.3"/>
    <rect x="35" y="124" width="50" height="4" rx="2" fill="#00d4ff" opacity="0.4"/>

    <!-- Right side floating elements -->
    <rect x="510" y="120" width="60" height="4" rx="2" fill="#00d4ff" opacity="0.5"/>
    <rect x="520" y="132" width="40" height="4" rx="2" fill="#00ffc8" opacity="0.3"/>
    <rect x="515" y="144" width="50" height="4" rx="2" fill="#00d4ff" opacity="0.4"/>
  </g>

  <!-- Participant dots (bottom area, like webinar attendees) -->
  <g transform="translate(140, 340)" filter="url(#glow)" opacity="0.5">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="0" cy="-3" r="3" fill="#00d4ff" opacity="0.4"/>
    <circle cx="50" cy="0" r="8" fill="none" stroke="#00ffc8" stroke-width="1.5"/>
    <circle cx="50" cy="-3" r="3" fill="#00ffc8" opacity="0.4"/>
    <circle cx="100" cy="0" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="100" cy="-3" r="3" fill="#00d4ff" opacity="0.4"/>
    <circle cx="150" cy="0" r="8" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="150" cy="-3" r="3" fill="#7c3aed" opacity="0.4"/>
    <circle cx="200" cy="0" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="200" cy="-3" r="3" fill="#00d4ff" opacity="0.4"/>
    <circle cx="250" cy="0" r="8" fill="none" stroke="#00ffc8" stroke-width="1.5"/>
    <circle cx="250" cy="-3" r="3" fill="#00ffc8" opacity="0.4"/>
    <circle cx="300" cy="0" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="300" cy="-3" r="3" fill="#00d4ff" opacity="0.4"/>
  </g>

  <!-- Corner accents -->
  <path d="M20,20 L50,20 M20,20 L20,50" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <path d="M580,20 L550,20 M580,20 L580,50" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <path d="M20,380 L50,380 M20,380 L20,350" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <path d="M580,380 L550,380 M580,380 L580,350" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
</svg>