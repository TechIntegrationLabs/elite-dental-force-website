<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2847"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffc8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hugeGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="micClip">
      <rect x="260" y="80" width="80" height="120" rx="40"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)"/>

  <!-- Pulsing circles (background) -->
  <circle cx="300" cy="160" r="120" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.06" filter="url(#hugeGlow)"/>
  <circle cx="300" cy="160" r="90" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.1" filter="url(#bigGlow)"/>
  <circle cx="300" cy="160" r="60" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.15" filter="url(#bigGlow)"/>

  <!-- Geometric microphone shape -->
  <g filter="url(#glow)">
    <!-- Mic body (rounded rect) -->
    <rect x="272" y="90" width="56" height="100" rx="28" fill="none" stroke="url(#micGrad)" stroke-width="2.5" opacity="0.9"/>
    <!-- Internal lines (grille) -->
    <line x1="285" y1="110" x2="315" y2="110" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <line x1="285" y1="122" x2="315" y2="122" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <line x1="285" y1="134" x2="315" y2="134" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <line x1="285" y1="146" x2="315" y2="146" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <line x1="285" y1="158" x2="315" y2="158" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <!-- Mic cradle -->
    <path d="M255,165 Q255,210 300,210 Q345,210 345,165" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <!-- Mic stand -->
    <line x1="300" y1="210" x2="300" y2="240" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
    <line x1="280" y1="240" x2="320" y2="240" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Sound wave visualization (left side) -->
  <g transform="translate(60, 200)" filter="url(#glow)">
    <rect x="0" y="-25" width="4" height="50" rx="2" fill="#00d4ff" opacity="0.5"/>
    <rect x="12" y="-40" width="4" height="80" rx="2" fill="#00d4ff" opacity="0.6"/>
    <rect x="24" y="-15" width="4" height="30" rx="2" fill="#00ffc8" opacity="0.4"/>
    <rect x="36" y="-55" width="4" height="110" rx="2" fill="#00d4ff" opacity="0.7"/>
    <rect x="48" y="-30" width="4" height="60" rx="2" fill="#00d4ff" opacity="0.5"/>
    <rect x="60" y="-45" width="4" height="90" rx="2" fill="#00ffc8" opacity="0.55"/>
    <rect x="72" y="-20" width="4" height="40" rx="2" fill="#00d4ff" opacity="0.45"/>
    <rect x="84" y="-60" width="4" height="120" rx="2" fill="#00d4ff" opacity="0.75"/>
    <rect x="96" y="-35" width="4" height="70" rx="2" fill="#00ffc8" opacity="0.5"/>
    <rect x="108" y="-18" width="4" height="36" rx="2" fill="#00d4ff" opacity="0.4"/>
  </g>

  <!-- Sound wave visualization (right side) -->
  <g transform="translate(420, 200)" filter="url(#glow)">
    <rect x="0" y="-18" width="4" height="36" rx="2" fill="#00d4ff" opacity="0.4"/>
    <rect x="12" y="-35" width="4" height="70" rx="2" fill="#00ffc8" opacity="0.5"/>
    <rect x="24" y="-60" width="4" height="120" rx="2" fill="#00d4ff" opacity="0.75"/>
    <rect x="36" y="-20" width="4" height="40" rx="2" fill="#00d4ff" opacity="0.45"/>
    <rect x="48" y="-45" width="4" height="90" rx="2" fill="#00ffc8" opacity="0.55"/>
    <rect x="60" y="-30" width="4" height="60" rx="2" fill="#00d4ff" opacity="0.5"/>
    <rect x="72" y="-55" width="4" height="110" rx="2" fill="#00d4ff" opacity="0.7"/>
    <rect x="84" y="-15" width="4" height="30" rx="2" fill="#00ffc8" opacity="0.4"/>
    <rect x="96" y="-40" width="4" height="80" rx="2" fill="#00d4ff" opacity="0.6"/>
    <rect x="108" y="-25" width="4" height="50" rx="2" fill="#00d4ff" opacity="0.5"/>
  </g>

  <!-- Waveform line (bottom flowing) -->
  <path d="M0,320 Q30,290 60,320 T120,320 T180,320 T240,320 T300,320 T360,320 T420,320 T480,320 T540,320 T600,320"
        fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.2" filter="url(#glow)"/>
  <path d="M0,340 Q30,325 60,340 T120,340 T180,340 T240,340 T300,340 T360,340 T420,340 T480,340 T540,340 T600,340"
        fill="none" stroke="#00ffc8" stroke-width="1" opacity="0.12"/>

  <!-- Frequency dots scattered -->
  <g opacity="0.4" filter="url(#glow)">
    <circle cx="150" cy="120" r="2" fill="#00d4ff"/>
    <circle cx="180" cy="90" r="1.5" fill="#00ffc8"/>
    <circle cx="420" cy="110" r="2" fill="#00d4ff"/>
    <circle cx="460" cy="85" r="1.5" fill="#00ffc8"/>
    <circle cx="130" cy="300" r="1.5" fill="#7c3aed"/>
    <circle cx="480" cy="290" r="2" fill="#7c3aed"/>
    <circle cx="200" cy="310" r="1" fill="#00d4ff"/>
    <circle cx="400" cy="305" r="1" fill="#00d4ff"/>
  </g>

  <!-- Corner accents -->
  <path d="M20,20 L50,20 M20,20 L20,50" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <path d="M580,20 L550,20 M580,20 L580,50" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <path d="M20,380 L50,380 M20,380 L20,350" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <path d="M580,380 L550,380 M580,380 L580,350" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
</svg>