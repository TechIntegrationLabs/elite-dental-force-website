<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffc8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a1628"/>

  <!-- Shield + tooth combined icon -->
  <g transform="translate(16, 15)" filter="url(#glow)">
    <!-- Shield outline -->
    <path d="M0,-11 L9,-7 L9,2 Q9,10 0,13 Q-9,10 -9,2 L-9,-7 Z"
          fill="none" stroke="url(#shieldGrad)" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Tooth shape inside shield -->
    <path d="M-3.5,-4 Q-4.5,-4 -5,-2.5 Q-5.5,-1 -4.5,0.5 L-3.5,4 Q-3,5.5 -2,4.5 L-1,2 Q0,0.5 1,2 L2,4.5 Q3,5.5 3.5,4 L4.5,0.5 Q5.5,-1 5,-2.5 Q4.5,-4 3.5,-4 Q2,-4 1,-3 Q0,-2 -1,-3 Q-2,-4 -3.5,-4 Z"
          fill="url(#shieldGrad)" opacity="0.85"/>
  </g>
</svg>